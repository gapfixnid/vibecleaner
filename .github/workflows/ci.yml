name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      TAURI_CONFIG: '{"bundle":{"resources":[]}}'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-runtime.txt
            requirements-test.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-test.txt
          npm ci
          npm --prefix frontend ci

      - name: Python tests
        run: python -m pytest -q

      - name: Golden image resource regression
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force benchmarks/results | Out-Null
          python scripts/benchmark_golden_regression.py `
            --output benchmarks/results/golden-regression.json `
            --repeat 3

      - name: Upload golden regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-image-regression
          path: benchmarks/results/golden-regression.json
          if-no-files-found: error

      - name: Frontend checks
        shell: pwsh
        run: |
          npm --prefix frontend test
          npm --prefix frontend run lint
          npm --prefix frontend run build

      - name: Rust tests and lint
        shell: pwsh
        run: |
          cargo fmt --manifest-path desktop/src-tauri/Cargo.toml -- --check
          cargo test --manifest-path desktop/src-tauri/Cargo.toml
          cargo clippy --manifest-path desktop/src-tauri/Cargo.toml --all-targets -- -D warnings
