name: Pipeline benchmark artifact

on:
  workflow_dispatch:
  push:
    paths:
      - "backend/pipeline/**"
      - "scripts/**benchmark**"
      - "scripts/evaluate_pipeline_rollout.py"
      - "tests/test_pipeline_benchmark.py"
      - "tests/test_pipeline_rollout_gate.py"
      - ".github/workflows/benchmark.yml"

jobs:
  benchmark:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install native Qt libraries
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0
      - name: Install CI test dependencies
        run: python -m pip install -r requirements-runtime.txt pytest
      - run: python -m pytest -q
      - name: Build benchmark dashboard
        if: always()
        run: >-
          python scripts/aggregate_pipeline_benchmark.py
          benchmarks/pipeline_shadow_benchmark.jsonl
          --output reports/pipeline-benchmark.html
          --summary reports/pipeline-benchmark.json
          --allow-missing
      - name: Evaluate rollout gate when benchmark data is present
        if: ${{ hashFiles('benchmarks/pipeline_shadow_benchmark.jsonl') != '' }}
        run: python scripts/evaluate_pipeline_rollout.py benchmarks/pipeline_shadow_benchmark.jsonl --minimum-samples 10
      - name: Upload benchmark reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-benchmark-report
          path: reports/
          if-no-files-found: error
