<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vibecleaner</title>
    <style>
      /* Pre-paint background per theme so there is no flash before app CSS loads. */
      html { background: #f5f5f7; }
      html[data-theme="dark"] { background: #161617; }
    </style>
    <script>
      /* Apply the saved theme (default: light) before first paint. */
      (function () {
        try {
          var t = localStorage.getItem("vibecleaner.theme");
          if (t !== "light" && t !== "dark") t = "light";
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
